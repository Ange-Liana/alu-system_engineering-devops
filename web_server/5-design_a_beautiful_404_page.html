<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        .title {
            font-size: 2rem;
            margin: 20px 0 10px 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8fa0b5;
            margin-bottom: 30px;
            font-style: italic;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: #090a0f;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.6);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            opacity: 0.4;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <h1 class="error-code">404</h1>
        <h2 class="title">Lost in the Cosmos</h2>
        <p class="subtitle">Ceci n'est pas une page</p>
        <a href="/" class="btn">RETURN HOME</a>
    </div>

</body>
</html>
