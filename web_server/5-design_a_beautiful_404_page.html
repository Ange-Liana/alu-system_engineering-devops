<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            z-index: 2;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: 0.5rem;
            background: linear-gradient(45deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 3s infinite ease-in-out;
        }

        .planet {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(45deg, #3a1c71, #d76d77, #ffaf7b);
            margin: 2rem auto;
            box-shadow: 0 0 30px rgba(215, 109, 119, 0.5);
            animation: float 4s infinite ease-in-out;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #e0e0e0;
        }

        p {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            background: linear-gradient(45deg, #7928ca, #ff007f);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="planet"></div>
        <h1>Ceci n'est pas une page</h1>
        <p>The page you are looking for has floated into deep space or never existed at all.</p>
        <a href="/" class="btn">Take Me Home</a>
    </div>
</body>
</html>
